<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; width: 1280px; height: 720px; overflow: hidden; }
  body {
    background: radial-gradient(1200px 800px at 70% 80%, #10203a 0%, #0a0e1a 60%);
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
  }
  .wrap { text-align: center; }
  .big {
    color: #e8ecf8; font-size: 66px; font-weight: 800; opacity: 0;
    animation: fadein 1.1s ease 0.5s forwards;
  }
  .mid {
    color: #6ea8ff; font-size: 40px; font-weight: 700; margin-top: 30px; opacity: 0;
    animation: fadein 1.1s ease 2.2s forwards;
  }
  .url {
    color: #7a86a8; font-size: 28px; margin-top: 54px; opacity: 0;
    font-family: "SF Mono", Menlo, monospace;
    animation: fadein 1s ease 3.8s forwards;
  }
  @keyframes fadein { from { opacity: 0; transform: translateY(14px); }
                      to   { opacity: 1; transform: none; } }
</style>
</head>
<body>
  <div class="wrap">
    <div class="big">Roles are tokens.</div>
    <div class="mid">ERC-7303 × MCP — grant with a mint, revoke with a burn</div>
    <div class="url">github.com/kofujimura/TCTC</div>
  </div>
</body>
</html>
